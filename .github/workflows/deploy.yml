# Workflow for deploying the Astro site to GitHub Pages
name: Deploy to GitHub Pages

on:
  # Allows you to run this workflow manually from the Actions tab in your repository
  workflow_dispatch:

# Sets the permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allows only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, it does NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Astro, Install Dependencies, and Build
        # Uses the official Astro action to handle common setup steps
        uses: withastro/action@v2
        # with:
          # node-version: 20 # Optional: The action defaults to a recent LTS version of Node.js
          # package-manager: npm@latest # Optional: The action automatically detects the package manager

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Astro's default build output directory
          path: ./dist
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
