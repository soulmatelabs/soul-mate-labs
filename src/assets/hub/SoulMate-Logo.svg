<svg width="1000" height="1000" viewBox="0 0 100 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <desc>Soul Mate Logo - Minimalistic Triple Twist Pikorua</desc>
    <defs>
        <linearGradient id="soulGradient" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Primary Twist Path -->
    <path 
        d="M50 20 
           C 30 20, 20 40, 50 60 
           C 80 80, 80 100, 50 120 
           C 20 140, 30 140, 50 140
           C 70 140, 80 120, 50 100
           C 20 80, 20 60, 50 40
           C 80 20, 70 20, 50 20 Z" 
        stroke="url(#soulGradient)" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round"
    />
</svg>