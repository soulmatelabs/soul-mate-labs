<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <filter id="blur" x="0" y="0">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" />
    </filter>
  </defs>
  <rect width="800" height="600" fill="#1a1a1a" />
  <circle cx="200" cy="200" r="100" fill="#333" filter="url(#blur)" opacity="0.5" />
  <circle cx="600" cy="400" r="150" fill="#444" filter="url(#blur)" opacity="0.3" />
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#555" font-family="sans-serif" font-size="48">Chaos Blur</text>
</svg>
